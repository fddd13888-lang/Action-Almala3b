<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Action Almala3b</title>
<script src="/socket.io/socket.io.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { width:100%; height:100%; overflow:hidden; background:#0a1628; font-family:'Tajawal',sans-serif; color:#fff; }
.screen { display:none; width:100%; height:100%; position:absolute; top:0; left:0; }
.screen.active { display:flex; flex-direction:column; align-items:center; justify-content:center; }

/* LOBBY */
#lobby { background:linear-gradient(160deg,#0a1628,#0d2137,#071020); padding:30px 24px; gap:20px; }
.logo-title { font-family:'Orbitron',sans-serif; font-size:clamp(22px,6vw,32px); color:#fff; text-shadow:0 0 20px rgba(0,229,255,0.6); text-align:center; }
.logo-title span { color:#00e5ff; }
.logo-sub { color:rgba(255,255,255,0.4); font-size:12px; letter-spacing:3px; text-align:center; margin-top:4px; }
.input-group { width:100%; max-width:320px; display:flex; flex-direction:column; gap:10px; }
.inp { width:100%; padding:14px 18px; background:rgba(255,255,255,0.07); border:1.5px solid rgba(0,229,255,0.3); border-radius:10px; color:#fff; font-family:'Tajawal',sans-serif; font-size:16px; outline:none; text-align:center; }
.inp::placeholder { color:rgba(255,255,255,0.3); }
.inp:focus { border-color:#00e5ff; }
.btn { width:100%; padding:15px; border:none; border-radius:10px; font-family:'Tajawal',sans-serif; font-size:16px; font-weight:700; cursor:pointer; transition:all 0.2s; letter-spacing:1px; }
.btn-primary { background:#00e5ff; color:#071020; }
.btn-primary:active { transform:scale(0.97); }
.btn-outline { background:transparent; border:2px solid #00e5ff; color:#00e5ff; }
.btn-outline:active { background:rgba(0,229,255,0.1); }
.or-divider { color:rgba(255,255,255,0.3); font-size:13px; }

/* WAITING */
#waiting { background:#0a1628; gap:20px; padding:30px; text-align:center; }
.room-code-box { background:rgba(0,229,255,0.08); border:2px solid #00e5ff; border-radius:14px; padding:20px 30px; }
.room-code-label { font-size:13px; color:rgba(255,255,255,0.5); margin-bottom:6px; }
.room-code { font-family:'Orbitron',sans-serif; font-size:40px; color:#00e5ff; letter-spacing:8px; }
.players-list { width:100%; max-width:320px; }
.player-chip { background:rgba(255,255,255,0.07); border-radius:8px; padding:10px 16px; margin-bottom:8px; text-align:right; font-size:15px; }
.waiting-msg { color:rgba(255,255,255,0.4); font-size:14px; }

/* GAME */
#game { display:none; flex-direction:column; width:100%; height:100%; background:#0a1628; overflow:hidden; position:relative; }
#game.active { display:flex; }
.top-bar { display:flex; justify-content:space-between; align-items:center; padding:4px 10px; background:rgba(0,0,0,0.3); border-bottom:1px solid rgba(255,255,255,0.06); flex-shrink:0; z-index:10; }
.turn-badge { background:rgba(0,229,255,0.15); border:1px solid #00e5ff; border-radius:20px; padding:3px 12px; font-size:11px; color:#00e5ff; }
.top-name { font-size:11px; color:rgba(255,255,255,0.4); }
.main-layout { flex:1; position:relative; overflow:hidden; display:flex; flex-direction:column; }

/* خصم فوق */
.opp-top { flex-shrink:0; background:rgba(255,0,80,0.04); border-bottom:1px solid rgba(255,255,255,0.07); padding:5px 50px; }

/* خصم يمين */
.opp-right { position:absolute; right:0; top:0; bottom:0; width:46px; background:rgba(255,165,0,0.04); border-left:1px solid rgba(255,255,255,0.07); display:flex; align-items:center; justify-content:center; z-index:5; }
.opp-right-inner { transform:rotate(90deg); display:flex; flex-direction:column; align-items:center; gap:3px; }
.opp-left { position:absolute; left:0; top:0; bottom:0; width:46px; background:rgba(0,255,150,0.04); border-right:1px solid rgba(255,255,255,0.07); display:flex; align-items:center; justify-content:center; z-index:5; }
.opp-left-inner { transform:rotate(-90deg); display:flex; flex-direction:column; align-items:center; gap:3px; }
.opp-name { font-size:9px; color:rgba(255,255,255,0.4); text-align:center; margin-bottom:2px; }

/* وسط */
.middle-zone { flex:1; margin:0 46px; display:flex; flex-direction:column; position:relative; overflow:hidden; }
.center-area { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); display:flex; align-items:center; justify-content:center; gap:16px; z-index:2; }
.deck-pile { width:64px; height:88px; background:linear-gradient(135deg,#1a2a4a,#0d1f35); border:2px solid rgba(0,229,255,0.4); border-radius:10px; display:flex; flex-direction:column; align-items:center; justify-content:center; box-shadow:0 0 20px rgba(0,229,255,0.35); flex-shrink:0; cursor:pointer; transition:transform 0.15s; user-select:none; }
.deck-pile:active { transform:scale(0.95); }
.deck-pile.drawn2 { border-color:rgba(255,255,255,0.15); box-shadow:none; opacity:0.6; }
.deck-num { font-family:'Orbitron',sans-serif; font-size:22px; color:#00e5ff; line-height:1; }
.deck-lbl { font-size:7px; color:rgba(255,255,255,0.3); margin-top:2px; }
.deck-hint { font-size:7px; color:rgba(0,229,255,0.5); margin-top:2px; }
.discard-slot { width:64px; height:88px; border:2px dashed rgba(255,255,255,0.15); border-radius:10px; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:4px; flex-shrink:0; background:rgba(255,255,255,0.02); overflow:hidden; gap:3px; }
.discard-card { width:46px; height:60px; border-radius:6px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:8px; text-align:center; padding:3px; line-height:1.3; border:1px solid rgba(255,255,255,0.15); }
.discard-label { font-size:7px; color:rgba(255,255,255,0.2); }

/* MY SECTION */
.my-section { flex-shrink:0; display:flex; flex-direction:column; background:rgba(0,229,255,0.03); border-top:1px solid rgba(255,255,255,0.07); margin:0 46px; }
.my-field-row { display:flex; gap:0; padding:5px 4px 3px; }
.my-zone-col { flex:1; display:flex; flex-direction:column; align-items:center; gap:1px; min-width:0; padding:0 3px; }
.my-zone-lbl { font-size:8px; color:rgba(255,255,255,0.25); text-align:center; margin-bottom:2px; }
.my-zone-cards-h { display:flex; gap:3px; justify-content:center; flex-wrap:nowrap; overflow:hidden; }
.zone-divider { width:1px; background:rgba(255,255,255,0.07); flex-shrink:0; }

.action-bar { display:flex; gap:8px; padding:5px 8px; background:rgba(0,0,0,0.3); justify-content:center; align-items:center; flex-shrink:0; }
.abtn { padding:7px 16px; border-radius:8px; border:none; font-family:'Tajawal',sans-serif; font-size:12px; font-weight:700; cursor:pointer; }
.abtn-end { background:#00e5ff; color:#071020; }
.abtn-end:disabled { background:rgba(255,255,255,0.1); color:rgba(255,255,255,0.3); cursor:not-allowed; }
.draw-remain { font-size:10px; color:rgba(0,229,255,0.7); background:rgba(0,229,255,0.08); border:1px solid rgba(0,229,255,0.2); border-radius:12px; padding:3px 10px; }

.hand-area { display:flex; gap:4px; padding:5px 6px; overflow-x:auto; align-items:flex-end; min-height:74px; scrollbar-width:none; flex-shrink:0; }
.hand-area::-webkit-scrollbar { display:none; }
.hand-card { width:46px; height:64px; flex-shrink:0; border-radius:6px; display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:9px; font-weight:700; position:relative; border:1.5px solid transparent; cursor:pointer; transition:transform 0.15s; }
.hand-card:active { transform:scale(0.93); }
.hand-card.selected { border-color:#00e5ff !important; transform:translateY(-7px); box-shadow:0 4px 14px rgba(0,229,255,0.5); }
.name-bar { text-align:center; font-size:10px; color:rgba(255,255,255,0.3); padding:3px; background:rgba(0,0,0,0.2); flex-shrink:0; }

/* ألوان كروت */
.card-GK    { background:linear-gradient(135deg,#f5a623,#e08800); border-color:rgba(245,166,35,0.4); }
.card-DEF   { background:linear-gradient(135deg,#4a90d9,#2874b5); border-color:rgba(74,144,217,0.4); }
.card-MID   { background:linear-gradient(135deg,#27ae60,#1e8449); border-color:rgba(39,174,96,0.4); }
.card-ATK   { background:linear-gradient(135deg,#e74c3c,#c0392b); border-color:rgba(231,76,60,0.4); }
.card-JOKER { background:linear-gradient(135deg,#8e44ad,#6c3483); border-color:rgba(142,68,173,0.5); }
.card-special { background:linear-gradient(135deg,#2c3e50,#1a252f); border-color:rgba(255,255,255,0.2); }
.card-num { font-family:'Orbitron',sans-serif; font-size:14px; color:#fff; }
.card-zone-txt { font-size:7px; color:rgba(255,255,255,0.7); }
.star-icon { position:absolute; top:2px; right:2px; font-size:8px; }
.cap-icon  { position:absolute; top:2px; left:2px; font-size:8px; }
.yellow-mark { position:absolute; bottom:2px; right:2px; background:#f1c40f; border-radius:50%; width:8px; height:8px; }

/* mini cards */
.mini-card { width:36px; height:26px; border-radius:4px; display:flex; align-items:center; justify-content:center; font-family:'Orbitron',sans-serif; font-size:11px; font-weight:700; color:#fff; flex-shrink:0; position:relative; border:1px solid rgba(255,255,255,0.12); cursor:pointer; }
.mini-card .s { position:absolute; top:1px; right:1px; font-size:6px; }
.mini-card .c { position:absolute; top:1px; left:1px; font-size:6px; }
.drop-hint-h { width:36px; height:26px; border:1px dashed rgba(255,255,255,0.1); border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:12px; color:rgba(255,255,255,0.1); flex-shrink:0; cursor:pointer; }
.field-row { display:flex; gap:0; }
.zone-col { flex:1; display:flex; flex-direction:column; align-items:center; gap:1px; min-width:0; padding:0 2px; }
.zone-lbl { font-size:7px; color:rgba(255,255,255,0.2); text-align:center; margin-bottom:1px; }
.zone-cards-h { display:flex; gap:2px; justify-content:center; flex-wrap:nowrap; overflow:hidden; }
.side-field { display:flex; gap:4px; align-items:center; justify-content:center; }
.side-zone { display:flex; flex-direction:column; align-items:center; gap:1px; }
.side-lbl { font-size:6px; color:rgba(255,255,255,0.2); }
.side-cards { display:flex; gap:1px; }
.mini-card-xs { width:24px; height:18px; border-radius:3px; display:flex; align-items:center; justify-content:center; font-family:'Orbitron',sans-serif; font-size:9px; font-weight:700; color:#fff; flex-shrink:0; border:1px solid rgba(255,255,255,0.1); cursor:pointer; }

/* POPUPS */
.popup-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:100; align-items:center; justify-content:center; }
.popup-overlay.show { display:flex; }
.popup-box { background:#0d1f35; border:2px solid rgba(0,229,255,0.4); border-radius:16px; padding:24px; max-width:300px; width:90%; text-align:center; }
.popup-title { font-family:'Orbitron',sans-serif; font-size:20px; color:#00e5ff; margin-bottom:12px; }
.popup-msg { color:rgba(255,255,255,0.7); font-size:14px; margin-bottom:20px; line-height:1.6; }
#zone-popup { z-index:200; }
.zone-btns { display:flex; flex-direction:column; gap:10px; }
.zone-btn { padding:12px; border-radius:10px; border:none; font-family:'Tajawal',sans-serif; font-size:16px; font-weight:700; cursor:pointer; }
.zone-btn-GK  { background:#f5a623; color:#000; }
.zone-btn-DEF { background:#4a90d9; color:#fff; }
.zone-btn-MID { background:#27ae60; color:#fff; }
.zone-btn-ATK { background:#e74c3c; color:#fff; }
.toast { position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:rgba(0,229,255,0.15); border:1px solid #00e5ff; border-radius:20px; padding:8px 20px; font-size:13px; color:#00e5ff; z-index:300; animation:fadeToast 3s forwards; white-space:nowrap; }
.toast.error { background:rgba(255,59,59,0.2); border-color:#ff3b3b; color:#ff3b3b; }
@keyframes fadeToast { 0%{opacity:0;transform:translateX(-50%) translateY(10px)} 15%{opacity:1;transform:translateX(-50%) translateY(0)} 70%{opacity:1} 100%{opacity:0} }
#win-screen { background:rgba(0,0,0,0.9); z-index:500; flex-direction:column; gap:20px; text-align:center; padding:30px; }
.win-trophy { font-size:80px; }
.win-title { font-family:'Orbitron',sans-serif; font-size:28px; color:#ffd700; text-shadow:0 0 30px rgba(255,215,0,0.8); }
.win-sub { color:rgba(255,255,255,0.6); font-size:16px; }
.pending-banner { position:fixed; top:10px; left:50%; transform:translateX(-50%); background:rgba(255,165,0,0.2); border:1px solid orange; border-radius:20px; padding:6px 16px; font-size:12px; color:orange; z-index:400; display:none; }
.pending-banner.show { display:block; }
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby" class="screen active">
  <div><div class="logo-title">Action <span>Almala3b</span></div><div class="logo-sub">ONLINE CARD GAME</div></div>
  <div class="input-group">
    <input class="inp" id="playerName" placeholder="اسمك" maxlength="15">
    <button class="btn btn-primary" onclick="createRoom()">🏟️ إنشاء أوضة</button>
    <div class="or-divider">— أو —</div>
    <input class="inp" id="joinCode" placeholder="كود الأوضة (6 أرقام)" maxlength="6" inputmode="numeric">
    <button class="btn btn-outline" onclick="joinRoom()">🔗 انضم لأوضة</button>
  </div>
</div>

<!-- WAITING -->
<div id="waiting" class="screen">
  <div class="room-code-box">
    <div class="room-code-label">كود الأوضة — شاركه مع أصحابك</div>
    <div class="room-code" id="displayCode">——</div>
  </div>
  <div class="players-list" id="playersList"></div>
  <div class="waiting-msg" id="waitingMsg">في انتظار لاعب تاني...</div>
  <!-- ========== التعديل 3: إضافة زر ابدأ اللعبة ========== -->
  <button class="btn btn-primary" id="startGameBtn" style="max-width:200px; display:none;" onclick="startGame()">🎮 ابدأ اللعبة</button>
  <button class="btn btn-outline" style="max-width:200px" onclick="copyCode()">📋 نسخ الكود</button>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <div class="top-bar">
    <div class="turn-badge" id="turnIndicator">دورك ⚡</div>
    <div class="top-name" id="topName">👤 أنت</div>
  </div>
  <div class="main-layout">
    <div class="opp-top" id="opp-top-area"></div>
    <div class="opp-right" id="opp-right-area" style="display:none"><div class="opp-right-inner" id="opp-right-inner"></div></div>
    <div class="opp-left" id="opp-left-area" style="display:none"><div class="opp-left-inner" id="opp-left-inner"></div></div>
    <div class="middle-zone">
      <div class="center-area">
        <div class="deck-pile" id="deckPile" onclick="drawCard()">
          <div class="deck-num" id="deckCount">?</div>
          <div class="deck-lbl">ورقة</div>
          <div class="deck-hint" id="deckHint">اضغط لسحب</div>
        </div>
        <div class="discard-slot" id="discardSlot">
          <div class="discard-label">محروقة</div>
        </div>
      </div>
    </div>
    <div class="my-section">
      <!-- صف 1: وسط + هجوم -->
      <div class="my-field-row" style="display:flex;gap:6px;justify-content:center;padding:4px 4px 2px;">
        <div style="display:flex;flex-direction:column;align-items:center;gap:1px;">
          <div style="font-size:7px;color:rgba(255,255,255,0.25);margin-bottom:2px;">وسط</div>
          <div class="my-zone-cards-h" id="field-MID"></div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:1px;">
          <div style="font-size:7px;color:rgba(255,255,255,0.25);margin-bottom:2px;">هجوم</div>
          <div class="my-zone-cards-h" id="field-ATK"></div>
        </div>
      </div>
      <!-- صف 2: حارس + دفاع -->
      <div class="my-field-row" style="display:flex;gap:6px;justify-content:center;padding:2px 4px 3px;">
        <div style="display:flex;flex-direction:column;align-items:center;gap:1px;">
          <div style="font-size:7px;color:rgba(255,255,255,0.25);margin-bottom:2px;">حارس</div>
          <div class="my-zone-cards-h" id="field-GK"></div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:1px;">
          <div style="font-size:7px;color:rgba(255,255,255,0.25);margin-bottom:2px;">دفاع</div>
          <div class="my-zone-cards-h" id="field-DEF"></div>
        </div>
      </div>
      <div class="action-bar">
        <div class="draw-remain" id="drawCount">🃏 0 من 2</div>
        <button class="abtn abtn-end" id="endTurnBtn" onclick="endTurn()" disabled>✅ إنهاء الدور</button>
      </div>
      <div class="hand-area" id="myHand"></div>
      <div class="name-bar" id="myNameBar">👤 أنت</div>
    </div>
  </div>
</div>

<!-- ZONE POPUP -->
<div class="popup-overlay" id="zone-popup">
  <div class="popup-box">
    <div class="popup-title">اختار المنطقة</div>
    <div class="zone-btns" id="zoneBtns"></div><br>
    <button class="btn btn-outline" style="max-width:200px" onclick="closeZonePopup()">إلغاء</button>
  </div>
</div>

<!-- WIN -->
<div class="popup-overlay" id="win-screen">
  <div class="popup-box" style="max-width:340px">
    <div class="win-trophy">🏆</div>
    <div class="win-title" id="winTitle">فزت!</div>
    <div class="win-sub" id="winSub"></div><br>
    <button class="btn btn-primary" onclick="location.reload()">🔄 لعبة جديدة</button>
  </div>
</div>

<div class="pending-banner" id="pendingBanner"></div>

<!-- CANCEL ORDER POPUP -->
<div class="popup-overlay" id="cancelPopup" style="z-index:600;">
  <div class="popup-box">
    <div class="popup-title" style="color:#f1c40f;">⚠️ هجوم!</div>
    <div class="popup-msg" id="cancelAttackName"></div>
    <div style="color:rgba(255,255,255,0.5);font-size:12px;margin-bottom:16px;">عندك Cancel Order — عايز تستخدمه؟</div>
    <div style="display:flex;gap:10px;justify-content:center;">
      <button class="btn btn-primary" id="cancelYesBtn" style="max-width:130px;">✅ استخدم الكنسل</button>
      <button class="btn btn-outline" id="cancelNoBtn" style="max-width:130px;">❌ اقبل الهجوم</button>
    </div>
  </div>
</div>

<div class="popup-overlay" id="errorPopup">
  <div class="popup-box">
    <div class="popup-title" style="color:#ff3b3b">⚠️</div>
    <div class="popup-msg" id="errorMsg"></div>
    <button class="btn btn-outline" onclick="closeError()">حسناً</button>
  </div>
</div>

<script>
const socket = io();
let myIndex=-1, myHand=[], myField={GK:[],DEF:[],MID:[],ATK:[]};
let opponents=[], selectedCard=null, isMyTurn=false;
let myYellows={}, currentTurn=-1, deckCount=0, firstTurn=true, discardTop=null;
let placedThisTurn=0, drawnThisTurn=0, myName='', mySwapCard=null;
let roomCode='';
let isRoomOwner=false;  // متغير جديد لتحديد صاحب الغرفة

function createRoom(){
  const name=document.getElementById('playerName').value.trim();
  if(!name) return showToast('اكتب اسمك الأول!',true);
  myName=name;
  socket.emit('create_room',{playerName:name});
  isRoomOwner=true;  // صاحب الغرفة
}
function joinRoom(){
  const name=document.getElementById('playerName').value.trim();
  const code=document.getElementById('joinCode').value.trim().toUpperCase();
  if(!name||!code) return showToast('اكتب اسمك والكود!',true);
  myName=name;
  socket.emit('join_room',{code,playerName:name});
  isRoomOwner=false;  // ليس صاحب الغرفة
}
function copyCode(){
  navigator.clipboard.writeText(roomCode);
  showToast('✅ الكود اتنسخ!');
}

// ========== التعديل 3: دالة بدء اللعبة ==========
function startGame(){
  socket.emit('start_game');
}

socket.on('room_created',({code})=>{
  roomCode=code;
  document.getElementById('displayCode').textContent=code;
  showScreen('waiting');
});
socket.on('room_joined',({code})=>{
  roomCode=code;
  document.getElementById('displayCode').textContent=code;
  showScreen('waiting');
});
socket.on('players_update',({players})=>{
  const list=document.getElementById('playersList');
  list.innerHTML=players.map((p,i)=>i===0?`<div class="player-chip">👑 ${p} (المضيف)</div>`:`<div class="player-chip">🎮 ${p}</div>`).join('');
  
  // ========== التعديل 3: إظهار/إخفاء زر ابدأ اللعبة ==========
  const startBtn = document.getElementById('startGameBtn');
  const waitMsg = document.getElementById('waitingMsg');
  
  if(players.length >= 2) {
    waitMsg.textContent = 'جاهز للبدء! اضغط "ابدأ اللعبة"';
    if(isRoomOwner) {
      startBtn.style.display = 'block';  // إظهار الزر لصاحب الغرفة فقط
    }
  } else {
    waitMsg.textContent = 'في انتظار لاعب تاني...';
    startBtn.style.display = 'none';
  }
});

socket.on('game_started',()=>showScreen('game'));
socket.on('game_state',({myHand:h,myField:f,myYellows:y,opponents:o,currentTurn:ct,myIndex:mi,deckCount:dc,firstTurn:ft,discardPile:dp})=>{
  myHand=h; myField=f; myYellows=y; opponents=o; myIndex=mi; deckCount=dc; firstTurn=ft;
  document.getElementById('deckCount').textContent=dc;
  const prevTurn=currentTurn;
  isMyTurn=(ct===mi); currentTurn=ct;
  if(dp&&dp.length>0) discardTop=dp[dp.length-1];
  if(isMyTurn && prevTurn!==ct){ placedThisTurn=0; drawnThisTurn=0; }
  renderGame();
});
socket.on('game_over',({winner})=>{
  const w=winner===myName;
  document.getElementById('winTitle').textContent=w?'🏆 فزت!':`${winner} فاز!`;
  document.getElementById('winSub').textContent=w?'أحسنت! التشكيل اكتمل!':'حاول تاني!';
  document.getElementById('win-screen').classList.add('show');
});
socket.on('error',({msg})=>showToast(msg,true));
socket.on('player_left',({msg})=>showToast(msg,true));
socket.on('special_pending',({cardName,fromPlayer,targetPlayer,targetIsMe})=>{
  if(targetIsMe){
    const cancelCard=myHand.find(c=>c.name==="Cancel Order");
    if(cancelCard){ showCancelPopup(cardName,fromPlayer,cancelCard.id); return; }
  }
  const b=document.getElementById('pendingBanner');
  b.textContent=`⚡ ${fromPlayer} لعب ${cardName} على ${targetPlayer||''}`;
  b.classList.add('show'); setTimeout(()=>b.classList.remove('show'),3500);
});
socket.on('special_cancelled',({by})=>showToast(`${by} ألغى الكارت الخاص! 🚫`));

function showCancelPopup(cardName,fromPlayer,cancelCardId){
  document.getElementById('cancelAttackName').textContent=fromPlayer+' لعب '+cardName+' عليك!';
  document.getElementById('cancelPopup').classList.add('show');
  window._cancelTimeout=setTimeout(()=>{ document.getElementById('cancelPopup').classList.remove('show'); },3000);
  document.getElementById('cancelYesBtn').onclick=()=>{
    clearTimeout(window._cancelTimeout);
    document.getElementById('cancelPopup').classList.remove('show');
    socket.emit('cancel_order',{cardId:cancelCardId});
  };
  document.getElementById('cancelNoBtn').onclick=()=>{
    clearTimeout(window._cancelTimeout);
    document.getElementById('cancelPopup').classList.remove('show');
  };
}

function drawCard(){
  if(!isMyTurn) return;
  if(drawnThisTurn>=2) return showToast('سحبت الحد الأقصى (2 كروت)!',true);
  socket.emit('draw_card');
  drawnThisTurn++; updateDrawCount();
}
function updateDrawCount(){
  const el=document.getElementById('drawCount');
  if(el) el.textContent=`🃏 ${drawnThisTurn} من 2`;
  const deck=document.getElementById('deckPile');
  const hint=document.getElementById('deckHint');
  if(drawnThisTurn>=2){ deck.classList.add('drawn2'); if(hint) hint.textContent='سحبت الكل'; }
  else { deck.classList.remove('drawn2'); if(hint) hint.textContent=isMyTurn?'اضغط لسحب':''; }
}
function endTurn(){
  if(!isMyTurn) return;
  socket.emit('end_turn');
  placedThisTurn=0; drawnThisTurn=0; selectedCard=null;
}

function getCardBg(card){
  const m={GK:'linear-gradient(135deg,#f5a623,#e08800)',DEF:'linear-gradient(135deg,#4a90d9,#2874b5)',MID:'linear-gradient(135deg,#27ae60,#1e8449)',ATK:'linear-gradient(135deg,#e74c3c,#c0392b)',JOKER:'linear-gradient(135deg,#8e44ad,#6c3483)'};
  return card.type==='special'?'linear-gradient(135deg,#2c3e50,#1a252f)':(card.joker?m.JOKER:(m[card.zone]||m.GK));
}

function renderGame(){
  document.getElementById('myNameBar').textContent=`👤 ${myName}`;
  document.getElementById('topName').textContent=`👤 ${myName}`;
  document.getElementById('turnIndicator').textContent=isMyTurn?'دورك ⚡':`دور ${opponents[currentTurn>myIndex?currentTurn-myIndex-1:currentTurn]?.name||'...'}`;
  document.getElementById('endTurnBtn').disabled=!isMyTurn||drawnThisTurn<2;
  updateDrawCount(); renderDiscard(); renderMyField(); renderMyHand(); renderOpponents();
}

function renderDiscard(){
  const slot=document.getElementById('discardSlot');
  slot.innerHTML='';
  if(discardTop){
    const c=document.createElement('div'); c.className='discard-card';
    c.style.background=getCardBg(discardTop);
    c.textContent=discardTop.type==='special'?discardTop.name:(discardTop.number||discardTop.zone);
    slot.appendChild(c);
  }
  const lbl=document.createElement('div'); lbl.className='discard-label'; lbl.textContent='محروقة'; slot.appendChild(lbl);
}

function renderMyField(){
  const fieldCount=Object.values(myField).reduce((s,z)=>s+z.length,0);
  ['GK','DEF','MID','ATK'].forEach(zone=>{
    const el=document.getElementById(`field-${zone}`); el.innerHTML='';
    (myField[zone]||[]).forEach(card=>el.appendChild(makeMiniCard(card,true,zone)));
    if(isMyTurn&&fieldCount<11){
      const h=document.createElement('div'); h.className='drop-hint-h'; h.textContent='+';
      h.onclick=()=>{ if(selectedCard) placeSelected(zone); }; el.appendChild(h);
    }
  });
}

function renderMyHand(){
  const el=document.getElementById('myHand'); el.innerHTML='';
  myHand.forEach(card=>el.appendChild(makeHandCard(card)));
}

function renderOpponents(){
  const topArea=document.getElementById('opp-top-area');
  const rightArea=document.getElementById('opp-right-area');
  const rightInner=document.getElementById('opp-right-inner');
  const leftArea=document.getElementById('opp-left-area');
  const leftInner=document.getElementById('opp-left-inner');
  topArea.innerHTML=''; rightInner.innerHTML=''; leftInner.innerHTML='';
  rightArea.style.display='none'; leftArea.style.display='none';

  opponents.forEach((opp,i)=>{
    if(i===0){
      topArea.innerHTML=`<div class="opp-name">👤 ${opp.name}${opp.skipped?' ⏭':''}</div>`;
      const row=document.createElement('div'); row.className='field-row';
      // صف 1: وسط + هجوم
      const row1=document.createElement('div'); row1.style.cssText='display:flex;gap:6px;justify-content:center;margin-bottom:3px;';
      ['MID','ATK'].forEach(zone=>{
        const col=document.createElement('div'); col.style.cssText='display:flex;flex-direction:column;align-items:center;gap:1px;';
        const lbl=document.createElement('div'); lbl.style.cssText='font-size:7px;color:rgba(255,255,255,0.2);margin-bottom:1px;';
        lbl.textContent=zone==='MID'?'وسط':'هجوم'; col.appendChild(lbl);
        const cards=document.createElement('div'); cards.className='zone-cards-h';
        (opp.field[zone]||[]).forEach(card=>cards.appendChild(makeMiniCard(card,false,zone,opp)));
        col.appendChild(cards); row1.appendChild(col);
      });
      topArea.appendChild(row1);
      // صف 2: حارس + دفاع
      const row2=document.createElement('div'); row2.style.cssText='display:flex;gap:6px;justify-content:center;';
      ['GK','DEF'].forEach(zone=>{
        const col=document.createElement('div'); col.style.cssText='display:flex;flex-direction:column;align-items:center;gap:1px;';
        const lbl=document.createElement('div'); lbl.style.cssText='font-size:7px;color:rgba(255,255,255,0.2);margin-bottom:1px;';
        lbl.textContent=zone==='GK'?'حارس':'دفاع'; col.appendChild(lbl);
        const cards=document.createElement('div'); cards.className='zone-cards-h';
        (opp.field[zone]||[]).forEach(card=>cards.appendChild(makeMiniCard(card,false,zone,opp)));
        col.appendChild(cards); row2.appendChild(col);
      });
      topArea.appendChild(row2);
    } else if(i===1){
      rightArea.style.display='flex';
      const nameEl=document.createElement('div'); nameEl.className='opp-name'; nameEl.textContent=`👤 ${opp.name}${opp.skipped?' ⏭':''}`;
      rightInner.appendChild(nameEl); rightInner.appendChild(makeSideField(opp));
    } else if(i===2){
      leftArea.style.display='flex';
      const nameEl=document.createElement('div'); nameEl.className='opp-name'; nameEl.textContent=`👤 ${opp.name}${opp.skipped?' ⏭':''}`;
      leftInner.appendChild(nameEl); leftInner.appendChild(makeSideField(opp));
    }
  });
}

function makeSideField(opp){
  const sf=document.createElement('div'); sf.className='side-field';
  ['GK','DEF','MID','ATK'].forEach(zone=>{
    const sz=document.createElement('div'); sz.className='side-zone';
    const sl=document.createElement('div'); sl.className='side-lbl'; sl.textContent=zone; sz.appendChild(sl);
    const sc=document.createElement('div'); sc.className='side-cards';
    (opp.field[zone]||[]).forEach(card=>{
      const el=document.createElement('div'); el.className='mini-card-xs';
      el.style.background=getCardBg(card);
      el.textContent=card.number||(card.star?'★':'')|(card.joker?'🃏':zone[0]);
      if(isMyTurn){
        el.style.cursor='pointer';
        el.onclick=(e)=>{
          e.stopPropagation();
          if(!selectedCard||selectedCard.type!=='special'){showToast('اختار كارت خاص الأول!',true);return;}
          handleOppCardClick(card,opp);
        };
      }
      sc.appendChild(el);
    });
    sz.appendChild(sc); sf.appendChild(sz);
  });
  return sf;
}

function makeMiniCard(card,clickable,zone,oppData){
  const el=document.createElement('div'); el.className='mini-card';
  el.style.background=getCardBg(card);
  if(card.star){const s=document.createElement('span');s.className='s';s.textContent='⭐';el.appendChild(s);}
  if(card.captain){const c=document.createElement('span');c.className='c';c.textContent='©';el.appendChild(c);}
  const yellows=oppData?oppData.yellows:myYellows;
  if(yellows&&yellows[card.id]){const y=document.createElement('div');y.className='yellow-mark';el.appendChild(y);}
  const txt=document.createElement('span'); txt.textContent=card.joker?'🃏':(card.number||''); el.appendChild(txt);

  if(oppData && isMyTurn){
    // كارت الخصم — الـ onclick يتحقق من selectedCard وقت الضغط
    el.style.cursor='pointer';
    el.onclick=(e)=>{
      e.stopPropagation();
      if(!selectedCard || selectedCard.type!=='special') {
        showToast('اختار كارت خاص الأول!', true);
        return;
      }
      handleOppCardClick(card, oppData);
    };
  } else if(clickable && isMyTurn){
    // ========== التعديل 4: السماح بالضغط على كروت الملعب ==========
    el.style.cursor='pointer';
    el.onclick=()=>{
      if(selectedCard&&selectedCard.type==='special'&&selectedCard.name==='Trash Player'){
        socket.emit('play_special',{cardId:selectedCard.id,targetPlayerIdx:myIndex,targetCardId:card.id});
        placedThisTurn++; selectedCard=null; renderGame();
      } else if(card.joker) {
        const zones=['GK','DEF','MID','ATK'].filter(z=>z!==zone);
        showZonePopup(zones,(newZone)=>{socket.emit('move_joker',{cardId:card.id,newZone});});
      } else if(selectedCard && selectedCard.type==='special' && selectedCard.name==='Swap') {
        mySwapCard=card;
        showToast('تمام! دلوقتي اختار كارت الخصم');
      } else { 
        placeSelected(zone); 
      }
    };
  }
  return el;
}

function makeHandCard(card){
  const el=document.createElement('div');
  el.className=`hand-card card-${card.joker?'JOKER':(card.type==='special'?'special':card.zone)}`;
  if(selectedCard&&selectedCard.id===card.id) el.classList.add('selected');
  if(card.star){const s=document.createElement('div');s.className='star-icon';s.textContent='⭐';el.appendChild(s);}
  if(card.captain){const c=document.createElement('div');c.className='cap-icon';c.textContent='©️';el.appendChild(c);}
  if(card.type==='player'){
    if(card.joker){const n=document.createElement('div');n.style.fontSize='20px';n.textContent='🃏';el.appendChild(n);}
    else if(card.number){const n=document.createElement('div');n.className='card-num';n.textContent=card.number;el.appendChild(n);}
    const z=document.createElement('div');z.className='card-zone-txt';z.textContent=card.joker?'JOKER':card.zone;el.appendChild(z);
  } else {
    const n=document.createElement('div');n.style.cssText='font-size:8px;color:#fff;text-align:center;padding:2px;line-height:1.3;';n.textContent=card.name;el.appendChild(n);
  }
  if(isMyTurn){
    el.onclick=()=>{
      if(selectedCard&&selectedCard.id===card.id){selectedCard=null;renderMyHand();renderMyField();return;}
      selectedCard=card; renderMyHand(); renderMyField();
      if(card.type==='special'){
        if(card.name==='Trash Player') showToast('اختار لاعب من ملعبك تشيله');
        else if(card.name==='Cancel Order') showToast('هتستخدمه تلقائي لما حد يهاجمك');
        else showToast('اختار كارت الخصم اللي تأثر فيه');
      }
    };
  }
  return el;
}

function placeSelected(zone){
  if(!selectedCard||!isMyTurn) return;
  if(selectedCard.type==='special') return showToast('الكروت الخاصة مش بتتحط في الملعب!',true);
  const fieldCount=Object.values(myField).reduce((s,z)=>s+z.length,0);
  if(fieldCount>=11) return showToast('الملعب ممتلئ (11 لاعب)!',true);
  const ZONE_LIMITS={GK:1,DEF:5,MID:4,ATK:3};
  if(selectedCard.zone==='JOKER'){
    showZonePopup(['GK','DEF','MID','ATK'],(z)=>{
      if(myField[z].length>=ZONE_LIMITS[z]) return showToast('الحد الاقصى في '+z+' ('+ZONE_LIMITS[z]+')!',true);
      socket.emit('place_card',{cardId:selectedCard.id,zone:z});placedThisTurn++;selectedCard=null;
    });
    return;
  }
  const tz=selectedCard.zone;
  if(tz!==zone) return showToast('لازم تنزل الكارت في مركزه الصح ('+tz+')!',true);
  if(myField[tz].length>=ZONE_LIMITS[tz]) return showToast('الحد الاقصى في '+tz+' ('+ZONE_LIMITS[tz]+')!',true);
  socket.emit('place_card',{cardId:selectedCard.id,zone});
  placedThisTurn++; selectedCard=null;
}

function handleOppCardClick(card,oppData){
  if(!selectedCard||selectedCard.type!=='special') return;
  const oppIdx=opponents.indexOf(oppData);
  const realIdx=oppIdx>=myIndex?oppIdx+1:oppIdx;
  if(selectedCard.name==='Swap'){
    if(!mySwapCard) return showToast('اختار كارتك الاول من ملعبك!',true);
    socket.emit('play_special',{cardId:selectedCard.id,targetPlayerIdx:realIdx,targetCardId:card.id,myCardId:mySwapCard.id});
    mySwapCard=null;
    placedThisTurn++; selectedCard=null; renderGame();
  } else if(selectedCard.name==='Contract'){
    if(card.zone==='JOKER'){
      // جوكر: اسأل عايزه فين
      const sc=selectedCard, ri=realIdx, ci=card.id;
      showZonePopup(['GK','DEF','MID','ATK'],(z)=>{
        socket.emit('play_special',{cardId:sc.id,targetPlayerIdx:ri,targetCardId:ci,targetZone:z});
        placedThisTurn++; selectedCard=null; renderGame();
      });
    } else {
      socket.emit('play_special',{cardId:selectedCard.id,targetPlayerIdx:realIdx,targetCardId:card.id,targetZone:card.zone});
      placedThisTurn++; selectedCard=null; renderGame();
    }
  } else if(selectedCard.name==='Loan'){
    socket.emit('play_special',{cardId:selectedCard.id,targetPlayerIdx:realIdx,targetCardId:card.id,targetZone:card.zone==='JOKER'?'ATK':card.zone});
    placedThisTurn++; selectedCard=null; renderGame();
  } else {
    socket.emit('play_special',{cardId:selectedCard.id,targetPlayerIdx:realIdx,targetCardId:card.id});
    placedThisTurn++; selectedCard=null; renderGame();
  }
}

let zoneCallback=null;
function showZonePopup(zones,cb){
  zoneCallback=cb; const btns=document.getElementById('zoneBtns'); btns.innerHTML='';
  const labels={GK:'حارس مرمى',DEF:'دفاع',MID:'وسط',ATK:'هجوم'};
  zones.forEach(z=>{const b=document.createElement('button');b.className=`zone-btn zone-btn-${z}`;b.textContent=labels[z];b.onclick=()=>{closeZonePopup();cb(z);};btns.appendChild(b);});
  document.getElementById('zone-popup').classList.add('show');
}
function closeZonePopup(){document.getElementById('zone-popup').classList.remove('show');zoneCallback=null;}
function showScreen(name){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(name).classList.add('active');}
function showToast(msg,isError=false){const t=document.createElement('div');t.className=`toast${isError?' error':''}`;t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3100);}
function closeError(){document.getElementById('errorPopup').classList.remove('show');}
</script>
</body>
</html>
