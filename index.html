<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Action Almala3b</title>
<script src="/socket.io/socket.io.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { width:100%; height:100%; overflow:hidden; background:#0a1628; font-family:'Tajawal',sans-serif; color:#fff; }

/* ===== SCREENS ===== */
.screen { display:none; width:100%; height:100%; position:absolute; top:0; left:0; }
.screen.active { display:flex; flex-direction:column; align-items:center; justify-content:center; }

/* ===== LOBBY ===== */
#lobby {
  background: linear-gradient(160deg,#0a1628,#0d2137,#071020);
  padding: 30px 24px;
  gap: 20px;
}
.logo-title {
  font-family:'Orbitron',sans-serif;
  font-size: clamp(22px,6vw,32px);
  color:#fff;
  text-shadow: 0 0 20px rgba(0,229,255,0.6);
  text-align:center;
}
.logo-title span { color:#00e5ff; }
.logo-sub { color:rgba(255,255,255,0.4); font-size:12px; letter-spacing:3px; text-align:center; margin-top:4px; }

.input-group { width:100%; max-width:320px; display:flex; flex-direction:column; gap:10px; }
.inp {
  width:100%; padding:14px 18px;
  background:rgba(255,255,255,0.07);
  border:1.5px solid rgba(0,229,255,0.3);
  border-radius:10px; color:#fff;
  font-family:'Tajawal',sans-serif; font-size:16px;
  outline:none; text-align:center;
}
.inp::placeholder { color:rgba(255,255,255,0.3); }
.inp:focus { border-color:#00e5ff; }

.btn {
  width:100%; padding:15px;
  border:none; border-radius:10px;
  font-family:'Tajawal',sans-serif; font-size:16px; font-weight:700;
  cursor:pointer; transition:all 0.2s;
  letter-spacing:1px;
}
.btn-primary { background:#00e5ff; color:#071020; }
.btn-primary:active { transform:scale(0.97); }
.btn-outline { background:transparent; border:2px solid #00e5ff; color:#00e5ff; }
.btn-outline:active { background:rgba(0,229,255,0.1); }
.btn-red { background:#ff3b3b; color:#fff; }

.or-divider { color:rgba(255,255,255,0.3); font-size:13px; }

/* ===== WAITING ===== */
#waiting { background:#0a1628; gap:20px; padding:30px; text-align:center; }
.room-code-box {
  background:rgba(0,229,255,0.08);
  border:2px solid #00e5ff;
  border-radius:14px; padding:20px 30px;
}
.room-code-label { font-size:13px; color:rgba(255,255,255,0.5); margin-bottom:6px; }
.room-code { font-family:'Orbitron',sans-serif; font-size:40px; color:#00e5ff; letter-spacing:8px; }
.players-list { width:100%; max-width:320px; }
.player-chip {
  background:rgba(255,255,255,0.07);
  border-radius:8px; padding:10px 16px;
  margin-bottom:8px; text-align:right; font-size:15px;
}
.waiting-msg { color:rgba(255,255,255,0.4); font-size:14px; }

/* ===== GAME ===== */
#game {
  display:none; flex-direction:column;
  width:100%; height:100%;
  background:#0a1628;
  position:relative; overflow:hidden;
}
#game.active { display:flex; }

/* مناطق اللاعبين */
.opponent-area {
  display:flex; align-items:center; justify-content:center;
  padding:4px; gap:3px; flex-wrap:wrap;
}
.opp-top { flex:0 0 auto; border-bottom:1px solid rgba(255,255,255,0.08); background:rgba(255,0,80,0.06); }
.opp-left { position:absolute; left:0; top:50%; transform:translateY(-50%) rotate(90deg); }
.opp-right { position:absolute; right:0; top:50%; transform:translateY(-50%) rotate(-90deg); }

/* منطقة المنتصف */
.center-area {
  flex:1; display:flex; align-items:center; justify-content:center;
  gap:16px; position:relative;
}
.deck-pile {
  width:60px; height:84px;
  background:linear-gradient(135deg,#1a2a4a,#0d1f35);
  border:2px solid rgba(0,229,255,0.4);
  border-radius:8px; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  cursor:pointer; font-size:11px; color:rgba(255,255,255,0.6);
  box-shadow:0 0 12px rgba(0,229,255,0.2);
}
.deck-count { font-family:'Orbitron',sans-serif; font-size:16px; color:#00e5ff; }

.turn-indicator {
  position:absolute; top:4px; left:50%; transform:translateX(-50%);
  background:rgba(0,229,255,0.15); border:1px solid #00e5ff;
  border-radius:20px; padding:4px 14px; font-size:12px; color:#00e5ff;
  white-space:nowrap;
}

/* منطقة اللاعب الحالي */
.my-area {
  flex:0 0 auto;
  border-top:1px solid rgba(255,255,255,0.08);
  background:rgba(0,229,255,0.04);
}

/* الميدان */
.field-board {
  display:flex; flex-direction:column; gap:2px; padding:4px;
  width:100%;
}
.field-row {
  display:flex; align-items:center; gap:2px;
  min-height:32px;
}
.zone-label {
  font-size:9px; color:rgba(255,255,255,0.3);
  width:28px; text-align:center; flex-shrink:0;
}
.zone-cards { display:flex; flex-wrap:wrap; gap:2px; flex:1; }

/* الكارت */
.card {
  width:42px; height:58px;
  border-radius:5px; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  font-size:9px; font-weight:700; position:relative;
  cursor:pointer; transition:transform 0.15s;
  border:1.5px solid transparent; flex-shrink:0;
  user-select:none;
}
.card:active { transform:scale(0.93); }
.card.selected { border-color:#00e5ff !important; transform:translateY(-6px); box-shadow:0 4px 12px rgba(0,229,255,0.5); }
.card.hand-card { width:46px; height:64px; font-size:10px; }

/* ألوان الكروت */
.card-GK  { background:linear-gradient(135deg,#f5a623,#e08800); border-color:rgba(245,166,35,0.4); }
.card-DEF { background:linear-gradient(135deg,#4a90d9,#2874b5); border-color:rgba(74,144,217,0.4); }
.card-MID { background:linear-gradient(135deg,#27ae60,#1e8449); border-color:rgba(39,174,96,0.4); }
.card-ATK { background:linear-gradient(135deg,#e74c3c,#c0392b); border-color:rgba(231,76,60,0.4); }
.card-JOKER { background:linear-gradient(135deg,#8e44ad,#6c3483); border-color:rgba(142,68,173,0.5); }
.card-special { background:linear-gradient(135deg,#2c3e50,#1a252f); border-color:rgba(255,255,255,0.2); font-size:8px; }
.card-back { background:linear-gradient(135deg,#1a2a4a,#0d1f35); border-color:rgba(255,255,255,0.1); }

.card-num { font-family:'Orbitron',sans-serif; font-size:14px; color:#fff; }
.card-zone-txt { font-size:7px; color:rgba(255,255,255,0.7); margin-top:1px; }
.star-icon { position:absolute; top:2px; right:2px; font-size:8px; }
.cap-icon  { position:absolute; top:2px; left:2px;  font-size:8px; }
.yellow-mark { position:absolute; bottom:2px; right:2px; background:#f1c40f; border-radius:50%; width:8px; height:8px; }

/* اليد */
.hand-area {
  display:flex; gap:4px; padding:6px;
  overflow-x:auto; align-items:center;
  min-height:80px;
  scrollbar-width:none;
}
.hand-area::-webkit-scrollbar { display:none; }

/* أزرار التحكم */
.action-bar {
  display:flex; gap:8px; padding:6px 10px;
  background:rgba(0,0,0,0.3);
  justify-content:center; flex-wrap:wrap;
}
.action-btn {
  padding:8px 16px; border-radius:8px; border:none;
  font-family:'Tajawal',sans-serif; font-size:13px; font-weight:700;
  cursor:pointer; transition:all 0.2s;
}
.end-turn-btn { background:#00e5ff; color:#071020; }
.end-turn-btn:disabled { background:rgba(255,255,255,0.1); color:rgba(255,255,255,0.3); cursor:not-allowed; }

/* اسم اللاعب */
.my-name-bar {
  text-align:center; font-size:12px; color:rgba(255,255,255,0.5);
  padding:3px; background:rgba(0,0,0,0.2);
}

/* الأوبونينت كارت */
.opp-name-tag {
  font-size:10px; color:rgba(255,255,255,0.5);
  text-align:center; padding:2px;
}

/* ===== POPUP ===== */
.popup-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.8); z-index:100;
  align-items:center; justify-content:center;
}
.popup-overlay.show { display:flex; }
.popup-box {
  background:#0d1f35; border:2px solid rgba(0,229,255,0.4);
  border-radius:16px; padding:24px; max-width:300px; width:90%;
  text-align:center;
}
.popup-title { font-family:'Orbitron',sans-serif; font-size:20px; color:#00e5ff; margin-bottom:12px; }
.popup-msg { color:rgba(255,255,255,0.7); font-size:14px; margin-bottom:20px; line-height:1.6; }

/* ===== ZONE SELECT POPUP ===== */
#zone-popup { z-index:200; }
.zone-btns { display:flex; flex-direction:column; gap:10px; }
.zone-btn {
  padding:12px; border-radius:10px; border:none;
  font-family:'Tajawal',sans-serif; font-size:16px; font-weight:700;
  cursor:pointer;
}
.zone-btn-GK  { background:#f5a623; color:#000; }
.zone-btn-DEF { background:#4a90d9; color:#fff; }
.zone-btn-MID { background:#27ae60; color:#fff; }
.zone-btn-ATK { background:#e74c3c; color:#fff; }

/* notification toast */
.toast {
  position:fixed; bottom:100px; left:50%; transform:translateX(-50%);
  background:rgba(0,229,255,0.15); border:1px solid #00e5ff;
  border-radius:20px; padding:8px 20px; font-size:13px; color:#00e5ff;
  z-index:300; animation:fadeToast 3s forwards; white-space:nowrap;
}
.toast.error { background:rgba(255,59,59,0.2); border-color:#ff3b3b; color:#ff3b3b; }
@keyframes fadeToast {
  0%{opacity:0;transform:translateX(-50%) translateY(10px)}
  15%{opacity:1;transform:translateX(-50%) translateY(0)}
  70%{opacity:1}
  100%{opacity:0}
}

/* WIN SCREEN */
#win-screen {
  background:rgba(0,0,0,0.9); z-index:500;
  flex-direction:column; gap:20px; text-align:center; padding:30px;
}
.win-trophy { font-size:80px; }
.win-title { font-family:'Orbitron',sans-serif; font-size:28px; color:#ffd700; text-shadow:0 0 30px rgba(255,215,0,0.8); }
.win-sub { color:rgba(255,255,255,0.6); font-size:16px; }

/* special card pending */
.pending-banner {
  position:fixed; top:10px; left:50%; transform:translateX(-50%);
  background:rgba(255,165,0,0.2); border:1px solid orange;
  border-radius:20px; padding:6px 16px; font-size:12px; color:orange;
  z-index:400; display:none;
}
.pending-banner.show { display:block; }
</style>
</head>
<body>

<!-- ===== LOBBY ===== -->
<div id="lobby" class="screen active">
  <div>
    <div class="logo-title">Action <span>Almala3b</span></div>
    <div class="logo-sub">ONLINE CARD GAME</div>
  </div>
  <div class="input-group">
    <input class="inp" id="playerName" placeholder="اسمك" maxlength="15">
    <button class="btn btn-primary" onclick="createRoom()">🏟️ إنشاء أوضة</button>
    <div class="or-divider">— أو —</div>
    <input class="inp" id="joinCode" placeholder="كود الأوضة (6 أرقام)" maxlength="6" inputmode="numeric">
    <button class="btn btn-outline" onclick="joinRoom()">🔗 انضم لأوضة</button>
  </div>
</div>

<!-- ===== WAITING ===== -->
<div id="waiting" class="screen">
  <div class="room-code-box">
    <div class="room-code-label">كود الأوضة — شاركه مع أصحابك</div>
    <div class="room-code" id="displayCode">——</div>
  </div>
  <div class="players-list" id="playersList"></div>
  <div class="waiting-msg" id="waitingMsg">في انتظار لاعب تاني... (محتاج 2 على الأقل)</div>
  <button class="btn btn-outline" style="max-width:200px" onclick="copyCode()">📋 نسخ الكود</button>
</div>

<!-- ===== GAME ===== -->
<div id="game" class="screen">

  <!-- أوبونينت فوق -->
  <div class="opponent-area opp-top" id="opp-top-area">
    <div class="opp-name-tag" id="opp-top-name"></div>
  </div>

  <!-- منتصف: الديك + الملعب -->
  <div class="center-area">
    <div class="turn-indicator" id="turnIndicator">دورك ⚡</div>

    <!-- ملعب الأوبونينت يسار -->
    <div id="opp-left-field" style="display:none; position:absolute; left:2px; top:50%; transform:translateY(-50%); writing-mode:vertical-rl;"></div>

    <!-- الديك -->
    <div class="deck-pile" id="deckPile">
      <div class="deck-count" id="deckCount">?</div>
      <div>بنك</div>
    </div>

    <!-- ملعب اللاعب الحالي (المنتصف) -->
    <div class="field-board" id="myFieldBoard">
      <div class="field-row">
        <div class="zone-label">هجوم</div>
        <div class="zone-cards" id="field-ATK"></div>
      </div>
      <div class="field-row">
        <div class="zone-label">وسط</div>
        <div class="zone-cards" id="field-MID"></div>
      </div>
      <div class="field-row">
        <div class="zone-label">دفاع</div>
        <div class="zone-cards" id="field-DEF"></div>
      </div>
      <div class="field-row">
        <div class="zone-label">حارس</div>
        <div class="zone-cards" id="field-GK"></div>
      </div>
    </div>

    <!-- ملعب الأوبونينت يمين -->
    <div id="opp-right-field" style="display:none; position:absolute; right:2px; top:50%; transform:translateY(-50%);"></div>
  </div>

  <!-- يدي + أزرار -->
  <div class="my-area">
    <div class="action-bar">
      <button class="action-btn end-turn-btn" id="endTurnBtn" onclick="endTurn()">✅ إنهاء الدور</button>
      <button class="action-btn" style="background:#ff3b3b;color:#fff;" onclick="cancelSelected()">❌ إلغاء</button>
    </div>
    <div class="hand-area" id="myHand"></div>
    <div class="my-name-bar" id="myNameBar">أنت</div>
  </div>
</div>

<!-- ===== ZONE SELECT POPUP ===== -->
<div class="popup-overlay" id="zone-popup">
  <div class="popup-box">
    <div class="popup-title">اختار المنطقة</div>
    <div class="zone-btns" id="zoneBtns"></div>
    <br>
    <button class="btn btn-outline" style="max-width:200px" onclick="closeZonePopup()">إلغاء</button>
  </div>
</div>

<!-- ===== WIN SCREEN ===== -->
<div class="popup-overlay" id="win-screen">
  <div class="popup-box" style="max-width:340px">
    <div class="win-trophy">🏆</div>
    <div class="win-title" id="winTitle">فزت!</div>
    <div class="win-sub" id="winSub"></div>
    <br>
    <button class="btn btn-primary" onclick="location.reload()">🔄 لعبة جديدة</button>
  </div>
</div>

<!-- ===== SPECIAL PENDING ===== -->
<div class="pending-banner" id="pendingBanner"></div>

<!-- ===== ERROR POPUP ===== -->
<div class="popup-overlay" id="errorPopup">
  <div class="popup-box">
    <div class="popup-title" style="color:#ff3b3b">⚠️</div>
    <div class="popup-msg" id="errorMsg"></div>
    <button class="btn btn-outline" onclick="closeError()">حسناً</button>
  </div>
</div>

<script>
const socket = io();
let myIndex = -1;
let myHand = [];
let myField = { GK:[], DEF:[], MID:[], ATK:[] };
let opponents = [];
let selectedCard = null;
let isMyTurn = false;
let currentTurn = 0;
let playerCount = 1;
let myName = '';
let roomCode = '';
let gameFirstTurn = true;
let placedThisTurn = 0;

// ===== LOBBY ACTIONS =====
function createRoom() {
  myName = document.getElementById('playerName').value.trim() || 'لاعب 1';
  socket.emit('create_room', { name: myName });
}

function joinRoom() {
  myName = document.getElementById('playerName').value.trim() || 'لاعب';
  const code = document.getElementById('joinCode').value.trim();
  if (code.length !== 6) return showToast('اكتب كود صح (6 أرقام)', true);
  socket.emit('join_room', { code, name: myName });
}

function copyCode() {
  navigator.clipboard?.writeText(roomCode).then(() => showToast('تم نسخ الكود ✅'));
}

// ===== SOCKET EVENTS =====
socket.on('room_created', ({ code }) => {
  roomCode = code;
  document.getElementById('displayCode').textContent = code;
  showScreen('waiting');
});

socket.on('room_update', ({ players, code }) => {
  roomCode = code;
  document.getElementById('displayCode').textContent = code;
  const list = document.getElementById('playersList');
  list.innerHTML = players.map(n => `<div class="player-chip">👤 ${n}</div>`).join('');
  document.getElementById('waitingMsg').textContent =
    players.length >= 2 ? 'جاهزين! اللعبة هتبدأ...' : 'في انتظار لاعب تاني...';
});

socket.on('game_start', ({ playerNames }) => {
  showToast('اللعبة بدأت! 🎮');
  placedThisTurn = 0;
});

socket.on('game_state', (state) => {
  myIndex = state.myIndex;
  myHand = state.myHand;
  myField = state.myField;
  opponents = state.opponents;
  currentTurn = state.currentTurn;
  isMyTurn = currentTurn === myIndex;
  playerCount = state.playerCount;
  gameFirstTurn = state.firstTurn;

  showScreen('game');
  renderGame();
});

socket.on('game_over', ({ winner }) => {
  const isWinner = winner === myName;
  document.getElementById('winTitle').textContent = isWinner ? '🏆 فزت!' : `${winner} فاز!`;
  document.getElementById('winSub').textContent = isWinner ? 'أحسنت! التشكيل اكتمل!' : 'حاول تاني!';
  document.getElementById('win-screen').classList.add('show');
});

socket.on('error', ({ msg }) => showToast(msg, true));

socket.on('player_left', ({ msg }) => showToast(msg, true));

socket.on('special_pending', ({ cardName, fromPlayer, targetPlayer }) => {
  const banner = document.getElementById('pendingBanner');
  banner.textContent = `⚡ ${fromPlayer} لعب ${cardName} على ${targetPlayer || ''}`;
  banner.classList.add('show');
  setTimeout(() => banner.classList.remove('show'), 3500);
});

socket.on('special_cancelled', ({ by }) => showToast(`${by} ألغى الكارت الخاص! 🚫`));

// ===== RENDER =====
function renderGame() {
  document.getElementById('deckCount').textContent = '🃏';
  document.getElementById('myNameBar').textContent = `👤 ${myName}`;
  document.getElementById('endTurnBtn').disabled = !isMyTurn;
  document.getElementById('turnIndicator').textContent = isMyTurn ? 'دورك ⚡' : `دور ${opponents[currentTurn > myIndex ? currentTurn - myIndex - 1 : currentTurn]?.name || '...'}`;

  renderMyField();
  renderMyHand();
  renderOpponents();
}

function renderMyField() {
  ['GK','DEF','MID','ATK'].forEach(zone => {
    const el = document.getElementById(`field-${zone}`);
    el.innerHTML = '';
    (myField[zone] || []).forEach(card => {
      el.appendChild(makeCard(card, true, 'field'));
    });
    // Add drop zone hint
    if (isMyTurn) {
      const hint = document.createElement('div');
      hint.style.cssText = 'width:36px;height:50px;border:1.5px dashed rgba(255,255,255,0.15);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:18px;color:rgba(255,255,255,0.15);cursor:pointer;flex-shrink:0;';
      hint.textContent = '+';
      hint.onclick = () => { if (selectedCard) placeSelected(zone); };
      el.appendChild(hint);
    }
  });
}

function renderMyHand() {
  const el = document.getElementById('myHand');
  el.innerHTML = '';
  myHand.forEach(card => {
    const c = makeCard(card, true, 'hand');
    el.appendChild(c);
  });
}

function renderOpponents() {
  const topArea = document.getElementById('opp-top-area');
  topArea.innerHTML = '';

  if (opponents.length >= 1) {
    // top opponent
    const opp = opponents[0];
    const nameTag = document.createElement('div');
    nameTag.className = 'opp-name-tag';
    nameTag.textContent = `👤 ${opp.name} (${opp.handCount} كروت)`;
    topArea.appendChild(nameTag);

    // field
    const fieldEl = document.createElement('div');
    fieldEl.style.cssText = 'display:flex;gap:4px;flex-wrap:wrap;padding:4px;justify-content:center;';
    Object.values(opp.field).flat().forEach(card => {
      fieldEl.appendChild(makeCard(card, false, 'opp-field', opp));
    });
    topArea.appendChild(fieldEl);

    // hand (backs)
    const handEl = document.createElement('div');
    handEl.style.cssText = 'display:flex;gap:2px;padding:4px;justify-content:center;';
    for (let i = 0; i < Math.min(opp.handCount, 7); i++) {
      const back = document.createElement('div');
      back.className = 'card card-back';
      back.style.cssText = 'width:28px;height:40px;';
      handEl.appendChild(back);
    }
    topArea.appendChild(handEl);
  }
}

function makeCard(card, clickable, context, oppData) {
  const el = document.createElement('div');
  const isHand = context === 'hand';
  el.className = `card ${isHand ? 'hand-card' : ''} card-${card.joker ? 'JOKER' : (card.type === 'special' ? 'special' : card.zone)}`;

  if (selectedCard && selectedCard.id === card.id) el.classList.add('selected');

  // Icons
  if (card.star) {
    const s = document.createElement('div');
    s.className = 'star-icon'; s.textContent = '⭐';
    el.appendChild(s);
  }
  if (card.captain) {
    const c = document.createElement('div');
    c.className = 'cap-icon'; c.textContent = '©️';
    el.appendChild(c);
  }

  // Yellow marks
  if (oppData && oppData.yellows && oppData.yellows[card.id]) {
    const y = document.createElement('div');
    y.className = 'yellow-mark';
    el.appendChild(y);
  }

  // Number or name
  if (card.type === 'player') {
    if (card.joker) {
      const n = document.createElement('div');
      n.style.cssText = 'font-size:20px;';
      n.textContent = '🃏';
      el.appendChild(n);
    } else if (card.number) {
      const n = document.createElement('div');
      n.className = 'card-num';
      n.textContent = card.number;
      el.appendChild(n);
    }
    const z = document.createElement('div');
    z.className = 'card-zone-txt';
    z.textContent = card.joker ? 'JOKER' : card.zone;
    el.appendChild(z);
  } else {
    const n = document.createElement('div');
    n.style.cssText = 'font-size:8px;color:#fff;text-align:center;padding:2px;line-height:1.3;';
    n.textContent = card.name;
    el.appendChild(n);
  }

  if (clickable && isMyTurn) {
    el.onclick = () => handleCardClick(card, context, el);
  }

  // Clicking on opponent field card (for special)
  if (context === 'opp-field' && isMyTurn && oppData) {
    el.onclick = () => handleOppCardClick(card, oppData);
    el.style.cursor = 'pointer';
  }

  return el;
}

function handleCardClick(card, context, el) {
  if (context === 'hand') {
    if (selectedCard && selectedCard.id === card.id) {
      selectedCard = null;
      renderMyHand();
      renderMyField();
      return;
    }
    selectedCard = card;
    renderMyHand();
    renderMyField();

    // If special card → show instruction
    if (card.type === 'special') {
      if (card.name === 'Trash Player') {
        showToast('اختار لاعب من ملعبك تشيله');
      } else if (card.name === 'Cancel Order') {
        showToast('هتستخدمه تلقائي لما حد يهاجمك');
      } else {
        showToast('اختار كارت الخصم اللي تأثر فيه');
      }
    }
  } else if (context === 'field') {
    if (selectedCard && selectedCard.type === 'special' && selectedCard.name === 'Trash Player') {
      socket.emit('play_special', { cardId: selectedCard.id, targetPlayerIdx: myIndex, targetCardId: card.id });
      selectedCard = null;
      renderGame();
    }
  }
}

function handleOppCardClick(card, oppData) {
  if (!selectedCard || selectedCard.type !== 'special') return;
  const oppIdx = opponents.indexOf(oppData);
  const realIdx = oppIdx >= myIndex ? oppIdx + 1 : oppIdx;

  if (selectedCard.name === 'Loan' || selectedCard.name === 'Swap') {
    // Need zone for joker
    socket.emit('play_special', {
      cardId: selectedCard.id,
      targetPlayerIdx: realIdx,
      targetCardId: card.id,
      targetZone: card.zone === 'JOKER' ? 'ATK' : card.zone
    });
  } else {
    socket.emit('play_special', {
      cardId: selectedCard.id,
      targetPlayerIdx: realIdx,
      targetCardId: card.id
    });
  }
  selectedCard = null;
  renderGame();
}

function placeSelected(zone) {
  if (!selectedCard || !isMyTurn) return;
  if (selectedCard.type === 'special') return showToast('الكروت الخاصة مش بتتحط في الملعب!', true);

  // Joker zone select
  if (selectedCard.zone === 'JOKER') {
    showZonePopup(['GK','DEF','MID','ATK'], (z) => {
      socket.emit('place_card', { cardId: selectedCard.id, zone: z });
      placedThisTurn++;
      selectedCard = null;
    });
    return;
  }

  socket.emit('place_card', { cardId: selectedCard.id, zone });
  placedThisTurn++;
  selectedCard = null;
}

function cancelSelected() {
  selectedCard = null;
  renderGame();
}

function endTurn() {
  if (!isMyTurn) return;
  socket.emit('end_turn');
  placedThisTurn = 0;
  selectedCard = null;
}

// ===== ZONE POPUP =====
let zoneCallback = null;
function showZonePopup(zones, cb) {
  zoneCallback = cb;
  const btns = document.getElementById('zoneBtns');
  btns.innerHTML = '';
  const labels = { GK:'حارس مرمى', DEF:'دفاع', MID:'وسط', ATK:'هجوم' };
  zones.forEach(z => {
    const b = document.createElement('button');
    b.className = `zone-btn zone-btn-${z}`;
    b.textContent = labels[z];
    b.onclick = () => { closeZonePopup(); cb(z); };
    btns.appendChild(b);
  });
  document.getElementById('zone-popup').classList.add('show');
}
function closeZonePopup() {
  document.getElementById('zone-popup').classList.remove('show');
  zoneCallback = null;
}

// ===== UTILS =====
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(name).classList.add('active');
}

function showToast(msg, isError=false) {
  const t = document.createElement('div');
  t.className = `toast${isError?' error':''}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3100);
}

function closeError() {
  document.getElementById('errorPopup').classList.remove('show');
}
</script>
