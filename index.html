<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Action Almala3b - أكشن الملاعب</title>
<script src="/socket.io/socket.io.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;800&family=Rajdhani:wght@700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
/* ===== CSS الأصلي بالكامل ===== */
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { width:100%; height:100%; overflow:hidden; background:#0a1628; font-family:'Orbitron','Tajawal',sans-serif; color:#fff; }

#lang-screen {
  width: 100%; height: 100%; background: linear-gradient(180deg, #0f2027 0%, #203a43 40%, #111c22 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 30px;
  position: absolute; top: 0; left: 0; z-index: 9999;
}
#lang-screen.hidden { display: none; }

.screen { display:none; width:100%; height:100%; position:absolute; top:0; left:0; }
.screen.active { display:flex; flex-direction:column; align-items:center; justify-content:center; }

/* LOBBY & WAITING */
#lobby, #waiting { background:linear-gradient(160deg,#0f2027,#203a43,#111c22); padding:30px; gap:20px; text-align:center; }
.logo-title { font-size:clamp(22px,6vw,32px); color:#00e5ff; text-shadow:0 0 20px rgba(0,229,255,0.6); }
.inp { width:100%; max-width:320px; padding:14px; background:rgba(255,255,255,0.07); border:1.5px solid rgba(0,229,255,0.3); border-radius:10px; color:#fff; text-align:center; outline:none; }
.btn { width:100%; max-width:320px; padding:15px; border:none; border-radius:10px; font-weight:700; cursor:pointer; transition:0.2s; }
.btn-primary { background:#00e5ff; color:#071020; }
.btn-outline { background:transparent; border:2px solid #00e5ff; color:#00e5ff; }

/* GAME LAYOUT */
#game { display:none; width:100%; height:100%; flex-direction:column; background:#0a1628; position:relative; }
#game.active { display:flex; }
.top-bar { display:flex; justify-content:space-between; padding:10px; background:rgba(0,0,0,0.3); z-index:10; }
.turn-badge { background:rgba(0,229,255,0.15); border:1px solid #00e5ff; border-radius:20px; padding:4px 12px; font-size:12px; color:#00e5ff; }

.main-layout { flex:1; position:relative; overflow:hidden; display:flex; flex-direction:column; }
.middle-zone { flex:1; display:flex; align-items:center; justify-content:center; position:relative; }
.center-area { display:flex; gap:20px; z-index:2; }
.deck-pile { width:70px; height:100px; background:linear-gradient(135deg,#1a2a4a,#0d1f35); border:2px solid #00e5ff; border-radius:10px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; }

/* MY SECTION */
.my-section { background:rgba(0,229,255,0.03); border-top:1px solid rgba(255,255,255,0.1); padding:10px; }
.my-field-row { display:flex; justify-content:center; gap:10px; margin-bottom:10px; }
.my-zone-cards-h { display:flex; gap:5px; min-height:40px; padding:5px; border:1px dashed rgba(255,255,255,0.1); border-radius:5px; }
.hand-area { display:flex; gap:8px; padding:10px; overflow-x:auto; min-height:100px; }

/* CARDS */
.hand-card { width:60px; height:85px; border-radius:8px; display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:11px; cursor:pointer; position:relative; flex-shrink:0; border:2px solid transparent; }
.hand-card.selected { border-color:#00e5ff; transform:translateY(-10px); box-shadow:0 5px 15px rgba(0,229,255,0.4); }
.card-GK { background: #f5a623; } .card-DEF { background: #4a90d9; } .card-MID { background: #27ae60; } .card-ATK { background: #e74c3c; } .card-special { background: #2c3e50; } .card-JOKER { background: #8e44ad; }

/* POPUPS */
.popup-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:1000; align-items:center; justify-content:center; }
.popup-overlay.show { display:flex; }
.popup-box { background:#0d1f35; border:2px solid #00e5ff; border-radius:15px; padding:25px; max-width:320px; width:90%; text-align:center; }

.mini-card { width:40px; height:30px; border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:bold; color:#fff; border:1px solid rgba(255,255,255,0.2); }
</style>
</head>
<body>

<!-- شاشة اللغة -->
<div id="lang-screen">
  <h1 class="logo-title">ACTION ALMALA3B</h1>
  <div style="display:flex; gap:20px;">
    <button class="btn btn-outline" style="width:120px" onclick="selectLanguage('ar')">عربي</button>
    <button class="btn btn-outline" style="width:120px" onclick="selectLanguage('en')">English</button>
  </div>
</div>

<!-- LOBBY -->
<div id="lobby" class="screen">
  <h1 class="logo-title">Action <span>Almala3b</span></h1>
  <input class="inp" id="playerName" placeholder="اسمك / Your Name">
  <button class="btn btn-primary" onclick="createRoom()" id="createRoomBtn">🏟️ إنشاء غرفة / Create Room</button>
  <input class="inp" id="joinCode" placeholder="كود الغرفة / Room Code">
  <button class="btn btn-outline" onclick="joinRoom()" id="joinRoomBtn">🔗 انضمام / Join Room</button>
</div>

<!-- WAITING -->
<div id="waiting" class="screen">
  <div class="popup-box">
    <div style="font-size:14px; color:#00e5ff">كود الغرفة / Room Code</div>
    <div id="displayCode" style="font-size:32px; letter-spacing:5px; margin:10px 0">------</div>
    <div id="playersList" style="margin-bottom:20px"></div>
    <button class="btn btn-primary" id="startGameBtn" style="display:none" onclick="startGame()">🎮 ابدأ اللعبة / Start Game</button>
  </div>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <div class="top-bar">
    <div class="turn-badge" id="turnIndicator">...</div>
    <div id="topName">👤</div>
  </div>
  
  <div class="main-layout">
    <div id="opp-top-area" style="padding:10px; text-align:center"></div>
    
    <div class="middle-zone">
      <div class="center-area">
        <div class="deck-pile" id="deckPile" onclick="drawCard()">
          <div id="deckCount" style="font-size:24px">?</div>
          <div style="font-size:10px" id="deckLbl">Cards</div>
        </div>
        <div id="discardSlot" style="width:70px; height:100px; border:2px dashed #444; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:10px; color:#444">Discard</div>
      </div>
    </div>

    <div class="my-section">
      <div class="my-field-row">
        <div class="zone-box">
          <div style="font-size:10px; text-align:center" id="lblGK">GK</div>
          <div class="my-zone-cards-h" id="field-GK"></div>
        </div>
        <div class="zone-box">
          <div style="font-size:10px; text-align:center" id="lblDEF">DEF</div>
          <div class="my-zone-cards-h" id="field-DEF"></div>
        </div>
      </div>
      <div class="my-field-row">
        <div class="zone-box">
          <div style="font-size:10px; text-align:center" id="lblMID">MID</div>
          <div class="my-zone-cards-h" id="field-MID"></div>
        </div>
        <div class="zone-box">
          <div style="font-size:10px; text-align:center" id="lblATK">ATK</div>
          <div class="my-zone-cards-h" id="field-ATK"></div>
        </div>
      </div>

      <div style="display:flex; justify-content:space-between; align-items:center; padding:5px 15px;">
        <div id="drawCount" style="font-size:12px; color:#00e5ff">🃏 0/2</div>
        <button class="btn btn-primary" id="endTurnBtn" onclick="endTurn()" style="width:120px; padding:10px; font-size:14px" disabled>✅ End Turn</button>
      </div>

      <div class="hand-area" id="myHand"></div>
    </div>
  </div>
</div>

<!-- CANCEL ORDER POPUP -->
<div class="popup-overlay" id="cancelPopup">
  <div class="popup-box">
    <h3 style="color:#f1c40f" id="cancelTitle">⚠️ Attack!</h3>
    <div id="cancelAttackName" style="margin:15px 0"></div>
    <div style="font-size:12px; color:#aaa; margin-bottom:20px" id="cancelTimerMsg">You have 7 seconds to use Cancel Order</div>
    <div style="display:flex; gap:10px">
      <button class="btn btn-primary" id="cancelYesBtn">✅ Cancel</button>
      <button class="btn btn-outline" onclick="document.getElementById('cancelPopup').classList.remove('show')">❌ Accept</button>
    </div>
  </div>
</div>

<!-- WIN POPUP -->
<div class="popup-overlay" id="win-screen">
  <div class="popup-box">
    <div style="font-size:50px">🏆</div>
    <h2 id="winTitle">Winner!</h2>
    <button class="btn btn-primary" onclick="location.reload()">🔄 New Game</button>
  </div>
</div>

<!-- ZONE POPUP -->
<div class="popup-overlay" id="zone-popup">
  <div class="popup-box">
    <h3 id="zonePopupTitle">Choose Zone</h3>
    <div id="zoneBtns" style="display:flex; flex-direction:column; gap:10px; margin-top:15px"></div>
  </div>
</div>

<script>
// ===== الجافا سكريبت بالكامل =====
const socket = io();
let currentLang = 'en';
let myName = '', myHand = [], myField = {}, isMyTurn = false;
let drawnThisTurn = 0, currentTurnIdx = -1, myIndex = -1;
let selectedCard = null, mySwapCard = null;

const translations = {
  ar: {
    yourTurn: "دورك الآن ⚡", turnOf: "دور: ", deckLbl: "كروت", endTurn: "إنهاء الدور",
    GK: "حارس", DEF: "دفاع", MID: "وسط", ATK: "هجوم",
    cancelTitle: "⚠️ هجوم ضدك!", cancelMsg: "لديك 7 ثوانٍ لاستخدام كارت إلغاء الأمر",
    win: "مبروك! لقد فزت 🏆", lose: "لقد فاز {0} 🏟️", drawCount: "🃏 سحبت {0} من 2"
  },
  en: {
    yourTurn: "Your Turn ⚡", turnOf: "Turn: ", deckLbl: "Cards", endTurn: "End Turn",
    GK: "GK", DEF: "DEF", MID: "MID", ATK: "ATK",
    cancelTitle: "⚠️ Attack!", cancelMsg: "You have 7 seconds to use Cancel Order",
    win: "You Win! 🏆", lose: "{0} Wins! 🏟️", drawCount: "🃏 {0} of 2"
  }
};

function t(key) { return translations[currentLang][key] || key; }

function selectLanguage(lang) {
  currentLang = lang;
  document.getElementById('lang-screen').classList.add('hidden');
  document.getElementById('lobby').classList.add('active');
  document.getElementById('lblGK').textContent = t('GK');
  document.getElementById('lblDEF').textContent = t('DEF');
  document.getElementById('lblMID').textContent = t('MID');
  document.getElementById('lblATK').textContent = t('ATK');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// LOBBY ACTIONS
function createRoom() {
  const name = document.getElementById('playerName').value;
  if(!name) return alert("Enter name");
  myName = name;
  socket.emit('create_room', { playerName: name });
}

function joinRoom() {
  const name = document.getElementById('playerName').value;
  const code = document.getElementById('joinCode').value;
  if(!name || !code) return alert("Enter name and code");
  myName = name;
  socket.emit('join_room', { code, playerName: name });
}

function startGame() { socket.emit('start_game'); }

// SOCKET EVENTS
socket.on('room_created', (data) => {
  document.getElementById('displayCode').textContent = data.code;
  showScreen('waiting');
});

socket.on('room_joined', (data) => {
  document.getElementById('displayCode').textContent = data.code;
  showScreen('waiting');
});

socket.on('players_update', (data) => {
  document.getElementById('playersList').innerHTML = data.players.map(p => `<div>👤 ${p}</div>`).join('');
  if(data.players.length >= 2) document.getElementById('startGameBtn').style.display = 'block';
});

socket.on('game_started', () => showScreen('game'));

socket.on('game_state', (state) => {
  myHand = state.myHand;
  myField = state.myField;
  myIndex = state.myIndex;
  currentTurnIdx = state.currentTurn;
  isMyTurn = (myIndex === currentTurnIdx);
  
  document.getElementById('deckCount').textContent = state.deckCount;
  document.getElementById('turnIndicator').textContent = isMyTurn ? t('yourTurn') : t('turnOf') + state.opponents[0]?.name;
  document.getElementById('endTurnBtn').disabled = !isMyTurn || state.firstTurn;
  
  renderHand();
  renderField();
  renderOpponents(state.opponents);
});

// GAME ACTIONS
function drawCard() {
  if(!isMyTurn || drawnThisTurn >= 2) return;
  socket.emit('draw_card');
  drawnThisTurn++;
  document.getElementById('drawCount').textContent = t('drawCount').replace('{0}', drawnThisTurn);
}

function endTurn() {
  socket.emit('end_turn');
  drawnThisTurn = 0;
  document.getElementById('drawCount').textContent = t('drawCount').replace('{0}', 0);
  selectedCard = null;
}

function renderHand() {
  const container = document.getElementById('myHand');
  container.innerHTML = '';
  myHand.forEach(card => {
    const el = document.createElement('div');
    el.className = `hand-card card-${card.joker?'JOKER':(card.type==='special'?'special':card.zone)}`;
    if(selectedCard && selectedCard.id === card.id) el.classList.add('selected');
    
    el.innerHTML = `
      <div style="font-size:16px; font-weight:bold">${card.number || (card.type==='special'? '⚡' : '🃏')}</div>
      <div style="font-size:8px">${card.joker? 'JOKER' : (card.type==='special'? card.name : card.zone)}</div>
      ${card.star ? '<div style="position:absolute; top:2px; right:2px">⭐</div>' : ''}
      ${card.captain ? '<div style="position:absolute; top:2px; left:2px">©️</div>' : ''}
    `;
    
    el.onclick = () => {
      if(!isMyTurn) return;
      if(selectedCard && selectedCard.id === card.id) {
        selectedCard = null;
      } else {
        selectedCard = card;
      }
      renderHand();
    };
    container.appendChild(el);
  });
}

function renderField() {
  ['GK', 'DEF', 'MID', 'ATK'].forEach(zone => {
    const container = document.getElementById(`field-${zone}`);
    container.innerHTML = '';
    myField[zone].forEach(card => {
      const el = document.createElement('div');
      el.className = `mini-card card-${card.joker?'JOKER':card.zone}`;
      el.textContent = card.number || '🃏';
      el.onclick = () => handleFieldClick(card, zone);
      container.appendChild(el);
    });
    
    // زر الإضافة في المنطقة
    if(isMyTurn && selectedCard && selectedCard.type === 'player') {
      const addBtn = document.createElement('div');
      addBtn.className = 'mini-card';
      addBtn.style.border = '1px dashed #00e5ff';
      addBtn.textContent = '+';
      addBtn.onclick = () => {
        if(selectedCard.joker) {
          socket.emit('place_card', { cardId: selectedCard.id, zone: zone });
        } else if(selectedCard.zone === zone) {
          socket.emit('place_card', { cardId: selectedCard.id, zone: zone });
        }
        selectedCard = null;
      };
      container.appendChild(addBtn);
    }
  });
}

function handleFieldClick(card, zone) {
  if(!isMyTurn || !selectedCard) return;
  if(selectedCard.name === 'Swap') {
    mySwapCard = card;
    alert("Now select an opponent's card to swap with");
  } else if(selectedCard.name === 'Trash Player') {
    socket.emit('play_special', { cardId: selectedCard.id, targetPlayerIdx: myIndex, targetCardId: card.id });
    selectedCard = null;
  }
}

function renderOpponents(opps) {
  const container = document.getElementById('opp-top-area');
  container.innerHTML = '';
  opps.forEach((opp, idx) => {
    const div = document.createElement('div');
    div.innerHTML = `<b>${opp.name}</b> (${opp.handCount} 🃏)`;
    const fieldDiv = document.createElement('div');
    fieldDiv.style.display = 'flex'; fieldDiv.style.justifyContent = 'center'; fieldDiv.style.gap = '5px';
    
    Object.keys(opp.field).forEach(zone => {
      opp.field[zone].forEach(card => {
        const c = document.createElement('div');
        c.className = `mini-card card-${card.joker?'JOKER':card.zone}`;
        c.textContent = card.number || '🃏';
        c.onclick = () => {
          if(!isMyTurn || !selectedCard || selectedCard.type !== 'special') return;
          const oppRealIdx = idx >= myIndex ? idx + 1 : idx;
          socket.emit('play_special', { 
            cardId: selectedCard.id, 
            targetPlayerIdx: oppRealIdx, 
            targetCardId: card.id,
            myCardId: mySwapCard ? mySwapCard.id : null,
            targetZone: zone
          });
          selectedCard = null; mySwapCard = null;
        };
        fieldDiv.appendChild(c);
      });
    });
    div.appendChild(fieldDiv);
    container.appendChild(div);
  });
}

// SPECIAL CARD REACTION (CANCEL ORDER)
socket.on('special_pending', (data) => {
  if(data.targetIsMe) {
    const cancelCard = myHand.find(c => c.name === 'Cancel Order');
    if(cancelCard) {
      document.getElementById('cancelAttackName').textContent = `${data.fromPlayer} played ${data.cardName} against you!`;
      document.getElementById('cancelPopup').classList.add('show');
      
      // التايمر يغلق النافذة بعد 7 ثوانٍ
      const timer = setTimeout(() => {
        document.getElementById('cancelPopup').classList.remove('show');
      }, 7000);

      document.getElementById('cancelYesBtn').onclick = () => {
        clearTimeout(timer);
        socket.emit('cancel_order', { cardId: cancelCard.id });
        document.getElementById('cancelPopup').classList.remove('show');
      };
    }
  }
});

socket.on('game_over', (data) => {
  document.getElementById('winTitle').textContent = data.winner === myName ? t('win') : t('lose').replace('{0}', data.winner);
  document.getElementById('win-screen').classList.add('show');
});

socket.on('error', (err) => alert(err.msg));
socket.on('special_cancelled', (data) => alert(`🚫 ${data.by} cancelled the attack!`));

</script>
</body>
</html>
